name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements/runtime.lock.txt
            requirements/dev.lock.txt
            pyproject.toml

      - name: Install dependencies from lock files
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.lock.txt
          python -m pip install -e . --no-deps

      - name: Validate dependency graph
        run: python -m pip check

      - name: Compile check
        run: python -m compileall ai_estimator service desktop

      - name: Run tests
        run: python -m pytest -q

      - name: CLI smoke test
        shell: bash
        run: |
          python -m ai_estimator.main --pdf missing.pdf --analysis-mode auto --output sample_output_ci.json
          python - <<'PY'
          import json
          with open("sample_output_ci.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          required = {
              "sheets_detected",
              "trade_scope",
              "scale_analysis",
              "legend_and_symbols",
              "geometry",
              "semantic_graph",
              "3d_model",
              "quantity_takeoff",
              "cost_mapping",
              "issues_or_ambiguities",
          }
          missing = sorted(required.difference(data))
          if missing:
              raise SystemExit(f"Missing output keys: {missing}")
          print("Smoke output keys verified.")
          PY

